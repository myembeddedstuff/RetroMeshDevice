[env:retroMeshDevice]
custom_meshtastic_hw_model = 81
custom_meshtastic_hw_model_slug = SEEED_XIAO_S3
custom_meshtastic_architecture = esp32-s3
custom_meshtastic_actively_supported = true
custom_meshtastic_support_level = 3
custom_meshtastic_display_name = RetroMeshDevice
custom_meshtastic_images = seeed-xiao-s3.svg
custom_meshtastic_tags = RetroMeshDevice
custom_meshtastic_requires_dfu = true
custom_meshtastic_partition_scheme = 8MB

extends = esp32s3_base
board = seeed-xiao-s3
board_level = pr
board_check = true
board_build.partitions = default_8MB.csv
upload_protocol = esptool
upload_speed = 921600
build_flags = 
  ${esp32s3_base.build_flags}
  -D RETROMESH_DEVICE
  -I variants/esp32s3/retroMeshDevice
  -DBOARD_HAS_PSRAM 
